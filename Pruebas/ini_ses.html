<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inicio de sesión</title>
        <link rel="stylesheet" href="proyecto.css" type="text/css">


<!--Links para fuentes de google-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">


    </head>
    <body>
        <header>
            <h1>AGRADECE EN COMPAÑIA</h1>
            <img src="./imagenes/fot1.png" alt="Logo EVG">
        </header>

        <article class="inicio-sesion">
            <h2>Iniciar sesión</h2>   
            <form action="" method="post">
                <fieldset>
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" name="usuario" required><br><br>
                    
                    <label for="contraseña">Contrasena:</label>
                    <input type="password" id="contrasena" name="contrasena" required><br><br>
                    
                    <input type="submit" value="Iniciar sesión">
                </fieldset>
            </form>
        </article>
        
    </body>
</html>
